name: Triage GitHub Issues

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  triage:
    name: 🔍 Triage
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write
    steps:
      - name: ✨ Run skill
        uses: TheTarry/Token-Effort/.github/actions/run-skill@main
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          skill_name: triaging-gh-issues
          prompt: "Triage all open issues in this repository."
          model: haiku
          allowed_tools: |
            Bash(printenv *)
            Bash(git remote get-url *)
            Bash(gh issue list *)
            Bash(gh issue view *)
            Bash(gh search issues *)
            Bash(gh issue edit *)
            Bash(gh issue comment *)
