name: Triage GitHub Issue

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: number

jobs:
  triage:
    name: 🔍 Triage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: ⤵️ Checkout skill source
        uses: actions/checkout@v7
        with:
          repository: HeadlessTarry/Token-Effort
          path: _skill-source
          persist-credentials: false

      - name: ⚙️ Install skill
        run: bash _skill-source/install.sh --skill triaging-gh-issue

      - name: ⤵️ Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: ⚙️ Configure OpenCode permissions
        run: |
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/opencode.json << 'EOF'
          {"$schema":"https://opencode.ai/config.json","permission":{"external_directory":{"/tmp/*":"allow"}}}
          EOF

      - name: ✨ Run OpenCode
        uses: anomalyco/opencode/github@127bdb30784d508cc556c71a0f32b508a3061517 # v1.18.3
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ vars.OPENCODE_MODEL || 'opencode-go/qwen3.7-plus' }}
          prompt: |
            Use the triaging-gh-issue skill to triage issue ${{ github.event.issue.number || inputs.issue_number }}.
