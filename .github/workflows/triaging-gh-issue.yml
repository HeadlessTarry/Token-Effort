name: Triage GitHub Issue

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: number

jobs:
  triage:
    name: 🔍 Triage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: ⤵️ Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # No need to run install.sh as skills are local to this repo

      - name: ✨ Run OpenCode
        uses: anomalyco/opencode/github@8ba2a9171597262df9d19516c82a5e14f18f5c63
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/qwen3.6-plus
          prompt: |
            Use the triaging-gh-issue skill to triage issue ${{ github.event.issue.number || inputs.issue_number }}.
          