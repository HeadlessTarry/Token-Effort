name: Triage GitHub Issue

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: number

jobs:
  triage:
    name: 🔍 Triage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: ⤵️ Checkout skill source
        uses: actions/checkout@v7
        with:
          repository: HeadlessTarry/Token-Effort
          path: _skill-source
          persist-credentials: false

      - name: ⚙️ Install skill
        run: bash _skill-source/install.sh --skill triaging-gh-issue

      - name: ⤵️ Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: ✨ Run OpenCode
        uses: anomalyco/opencode/github@11e47f91496005aab4d7c5a2d0a7da5d2651b4ac # v1.17.8
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode-go/qwen3.6-plus
          prompt: |
            Use the triaging-gh-issue skill to triage issue ${{ github.event.issue.number || inputs.issue_number }}.
